services:
  - type: web
    name: takku-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt && python backend/manage.py migrate
    startCommand: gunicorn --chdir backend core.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: takku-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*" # Change this to your Render URL later
      - key: CORS_ALLOWED_ORIGINS
        value: "*" # Change this to your Vercel URL later

databases:
  - name: takku-db
    plan: free
